
syntax = "proto3";

option java_multiple_files = true;
option java_package = "Generated_Stock_Monitor_Service";
option java_outer_classname = "CA1";

package service2;



service StockMonitor {   
   rpc ExpiryDate(Empty) returns (stream ItemStatus) {}  
   rpc AutoStockCheck(stream SoldItem) returns (stream ItemStatus){}
}
   

    message Empty {
   }
   
   message ItemStatus {
     string item_name = 1;
     int32 quantity = 2;
     string expiry_date = 3;
     string location = 4;
   }

    message SoldItem {
     string item_name = 1;
   }
 
   


