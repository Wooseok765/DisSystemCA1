syntax = "proto3";

option java_multiple_files = true;
option java_package = "Generated_Stock_Management_Service";
option java_outer_classname = "CA1";

package service1;



service StockMgmt {   
   rpc StockCheck(ItemName) returns (ItemStatus) {}  
   rpc BasketPrice(stream Items) returns (TotalPrice){}
}

   
   message ItemName {
     string item_name = 1;
   }

   message Items {
     string item_name = 1;
     double price = 2;
   }
   
   message ItemStatus {
     string item_name = 1;
     int32 quantity = 2;
     string expiry_date = 3;
     string location = 4;
   }

    message TotalPrice{
    int32 quantity_of_items = 1;
    double totalPrice = 2;
}
 
   


